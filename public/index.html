<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#06060a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Terrible People" />
  <title>Terrible People</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" type="image/png" href="/images/Terrible_Peolpe_Logo.png" />
  <link rel="apple-touch-icon" href="/images/Terrible_Peolpe_Logo.png" />
  <link rel="stylesheet" href="/game.css" />
</head>
<body class="theme">
  <header class="topbar">
    <div class="brand">
      <div class="logo"><img src="/images/Terrible_Peolpe_Logo.png" alt="Terrible People logo" /></div>
      <div class="titles">
        <div class="h1">Terrible People</div>
        <div class="h2" id="phaseLabel">Connecting…</div>
      </div>
    </div>

    <div class="statusCenter">
      <span class="pill rolePill" id="judgePill">Judge: --</span>
      <span class="pill rolePill leadGold" id="leadPill">Lead: --</span>
    </div>

    <div class="right">
      <a class="link" href="/lobby.html">Lobby</a>

      <details class="navDrop" id="playersDrop">
        <summary class="navDropBtn">Players <span class="navMeta" id="playersMeta">0</span></summary>
        <div class="navDropMenu">
          <div id="playersList" class="playersList"></div>
        </div>
      </details>

      <details class="navDrop" id="adminBox" style="display:none;">
        <summary class="navDropBtn">Admin <span class="navMeta">Menu</span></summary>
        <div class="navDropMenu">
          <div class="adminRow">
            <button class="btn" id="btnStart">Start</button>
            <button class="btn ghost" id="btnNext">Next Round</button>
          </div>
          <div class="adminRow">
            <button class="btn ghost" id="btnPause">Pause/Resume</button>
            <button class="btn ghost" id="btnReset">Reset</button>
          </div>
          <div class="adminRow">
            <button class="btn danger ghost" id="btnClearChat">Clear Chat</button>
          </div>
          <div class="smallHint" id="adminHint">Admin controls are local-only.</div>
        </div>
      </details>

      <details class="navDrop chatDrop" id="chatDrop">
        <summary class="navDropBtn">Chat <span class="navMeta" id="chatMeta">History</span></summary>
        <div class="navDropMenu chatMenu">
          <div id="chatLog" class="chatLog"></div>
          <div class="chatSend">
            <input class="input" id="chatInput" maxlength="220" placeholder="Type message…" />
            <button class="btn" id="chatSendBtn">Send</button>
          </div>
        </div>
      </details>

      <a class="link" href="/packs.html" aria-label="Settings" title="Settings">⚙</a>
      <span class="pill" id="timerPill">--:--</span>
    </div>
  </header>

  <main class="grid">
    <section class="card center">
      <div class="cardHead">
        <div class="cardTitle">Black Card</div>
        <div class="cardMeta" id="roundMeta">Round 0</div>
      </div>

      <div class="boardRow">
        <div class="boardBlack">
          <div class="tpCard tpCard--black blackCard" id="blackCard">Waiting for round…</div>
        </div>

        <div class="submissionsWrap" id="submissionsWrap" style="display:none;">
          <div class="subHead">
            <div class="cardTitle">Submissions</div>
            <div class="cardMeta" id="subMeta">0</div>
          </div>
          <div id="submissionsList" class="subList"></div>
        </div>
      </div>

      <div class="handWrap">
        <div class="handHead">
          <div class="cardTitle">Your Hand</div>
          <div class="cardMeta" id="handMeta">0</div>
        </div>
        <div id="handList" class="handList"></div>
      </div>
    </section>
  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/app-init.js"></script>
  <script src="/game.js"></script>
</body>
</html>
